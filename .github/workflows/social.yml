name: Callnomic Social

# Runs in GitHub's cloud for free. Every ~5 min it:
#  - reads your Telegram approvals (button taps) and publishes approved posts
#  - generates the next draft when it's time and sends it to you for approval
# Nothing runs on your machine; nothing costs a subscription.

on:
  schedule:
    # Off-peak minutes on purpose: GitHub heavily drops/delays crons on the crowded
    # */5 slots (this repo was getting ~6 runs/day instead of 288). Odd offsets fare better.
    - cron: "7,19,31,43,55 * * * *"
  workflow_dispatch:
    inputs:
      approve_all:
        description: "Approve & publish ALL pending drafts right now (skips Telegram approval; also retries failed posts)"
        type: boolean
        default: false
      force_draft:
        description: "Force a new image-post draft this run (ignore the timer)"
        type: boolean
        default: false
      force_reel:
        description: "Force a new Reel draft this run (ignore the timer)"
        type: boolean
        default: false

# Never let two runs mutate state at the same time.
concurrency:
  group: callnomic-social
  cancel-in-progress: false

permissions:
  contents: write # needed to commit updated state/ back to the repo

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Ensure ffmpeg (for Reels; no-op if already present)
        run: command -v ffmpeg || (sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg)

      - name: Run engine
        env:
          # Telegram approval bot
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # LinkedIn
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
          LINKEDIN_VERSION: ${{ vars.LINKEDIN_VERSION }}
          # Instagram
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_GRAPH_BASE: ${{ vars.IG_GRAPH_BASE }}
          # Optional AI freshness (leave unset to stay 100% free)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AI_FRESH: ${{ vars.AI_FRESH }}
          # Behaviour knobs (Repository Variables, all optional)
          PLATFORMS: ${{ vars.PLATFORMS }}
          POST_INTERVAL_HOURS: ${{ vars.POST_INTERVAL_HOURS }}
          FORCE_DRAFT: ${{ inputs.force_draft && '1' || '' }}
          APPROVE_ALL: ${{ inputs.approve_all && '1' || '' }}
          REMIND_AFTER_HOURS: ${{ vars.REMIND_AFTER_HOURS }}
          REMIND_REPEAT_HOURS: ${{ vars.REMIND_REPEAT_HOURS }}
          # Educational Reels (Instagram only)
          REELS_ENABLED: ${{ vars.REELS_ENABLED }}
          REEL_INTERVAL_HOURS: ${{ vars.REEL_INTERVAL_HOURS }}
          MAX_PENDING_REELS: ${{ vars.MAX_PENDING_REELS }}
          FORCE_REEL: ${{ inputs.force_reel && '1' || '' }}
          # So Instagram can fetch the committed image from this repo
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node src/run.js

      - name: Commit updated state
        run: |
          git config user.name "callnomic-bot"
          git config user.email "bot@callnomicsolutions.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "social: update state [skip ci]"
            git push
          fi
